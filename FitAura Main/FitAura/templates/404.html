{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--primary-bg); padding: 2rem;">
    <div style="text-align: center; max-width: 600px;">
        <div style="font-size: 8rem; font-weight: 700; background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem;">
            404
        </div>
        <h1 style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--text-primary);">Page Not Found</h1>
        <p style="color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 2rem;">
            Oops! The page you're looking for doesn't exist. It might have been moved or deleted.
        </p>
        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
            <a href="{{ url_for('index') }}" class="btn btn-primary">
                <i class="fas fa-home"></i>
                <span>Go Home</span>
            </a>
            {% if current_user.is_authenticated %}
            <a href="{{ url_for('chatbot.chat_interface') }}" class="btn btn-secondary">
                <i class="fas fa-comments"></i>
                <span>Start Chat</span>
            </a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
