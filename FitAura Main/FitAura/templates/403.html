{% extends "base.html" %}

{% block title %}403 - Access Denied{% endblock %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--primary-bg); padding: 2rem;">
    <div style="text-align: center; max-width: 600px;">
        <div style="font-size: 8rem; font-weight: 700; background: linear-gradient(135deg, var(--warning-color), #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem;">
            403
        </div>
        <h1 style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--text-primary);">Access Denied</h1>
        <p style="color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 2rem;">
            You don't have permission to access this resource. Please log in or contact support.
        </p>
        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
            <a href="{{ url_for('index') }}" class="btn btn-primary">
                <i class="fas fa-home"></i>
                <span>Go Home</span>
            </a>
            {% if not current_user.is_authenticated %}
            <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">
                <i class="fas fa-sign-in-alt"></i>
                <span>Sign In</span>
            </a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
